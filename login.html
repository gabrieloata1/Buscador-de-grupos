<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Buscador de Grupos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080b12;
      --surface: #0f1420;
      --border: #1e2535;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8ecf4;
      --muted: #5a6478;
      --error: #ff4d6d;
      --success: #00e5a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    .glow2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,229,255,0.08) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-badge {
      display: inline-block;
      font-size: 28px;
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,58,237,0.15));
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 14px;
      width: 60px;
      height: 60px;
      line-height: 60px;
      text-align: center;
      margin-bottom: 16px;
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .msg.erro {
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      color: var(--error);
      display: block;
    }

    .msg.ok {
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.3);
      color: var(--success);
      display: block;
    }

    .link-voltar {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .link-voltar:hover { color: var(--accent); }

    .spinner-btn {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-badge">🔍</div>
    <h1>Buscador de Grupos</h1>
    <p class="subtitle">Entre com suas credenciais de acesso</p>
  </div>

  <!-- Form Login -->
  <div id="formLogin">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="seu@email.com"/>
    <label>Senha</label>
    <input type="password" id="loginSenha" placeholder="••••••••"/>
    <button class="btn" onclick="fazerLogin()">Entrar</button>
  </div>

  <div class="msg" id="msg"></div>
  <a href="grupos.html" class="link-voltar">← Voltar ao buscador</a>
</div>

<script>
  const SB_URL = localStorage.getItem('sb_url') || ''
  const SB_KEY = localStorage.getItem('sb_key') || ''

  if (!SB_URL || !SB_KEY) {
    document.getElementById('msg').className = 'msg erro'
    document.getElementById('msg').textContent = 'Configure o Supabase no buscador primeiro.'
  }

  async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim()
    const senha = document.getElementById('loginSenha').value

    if (!email || !senha) return setMsg('Preencha email e senha.', 'erro')

    const btn = document.querySelector('.btn')
    btn.innerHTML = '<span class="spinner-btn"></span> Entrando...'
    btn.disabled = true

    try {
      const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: senha })
      })

      const data = await res.json()

      if (!res.ok) {
        setMsg(traduzirErro(data.error_description || data.msg), 'erro')
      } else {
        localStorage.setItem('sb_token', data.access_token)
        localStorage.setItem('sb_user', JSON.stringify(data.user))
        setMsg('✅ Login realizado! Redirecionando...', 'ok')
        setTimeout(() => window.location.href = 'grupos.html', 1200)
      }
    } catch(e) {
      setMsg('Erro de conexão.', 'erro')
    }

    btn.innerHTML = 'Entrar'
    btn.disabled = false
  }

  function traduzirErro(msg) {
    if (!msg) return 'Erro desconhecido.'
    if (msg.includes('Invalid login')) return 'Email ou senha incorretos.'
    if (msg.includes('valid email')) return 'Email inválido.'
    return msg
  }

  function setMsg(texto, tipo) {
    const el = document.getElementById('msg')
    el.textContent = texto
    el.className = tipo ? `msg ${tipo}` : 'msg'
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin()
  })
</script>
</body>
</html>
